name: Daily Market Data Fetch

on:
  workflow_dispatch:
  
permissions:
  contents: write

concurrency:
  group: daily-market-data-fetch
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FRED_WTI_SERIES: "DCOILWTICO"

      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

      TD_SP500_SYMBOL: "SPY"
      TD_TAIEX_SYMBOL: "0050"
      TD_TAIEX_EXCHANGE: "TWSE"
      TD_WTI_SYMBOL: "WTI"
      FRED_USDTWD_SERIES: "DEXTAUS"

      FED_LOWER_SERIES_ID: "DFEDTARL"
      FED_UPPER_SERIES_ID: "DFEDTARU"

      ECB_MRR_SERIES_KEY: "D.U2.EUR.4F.KR.MRR_RT.LEV"
      ECB_DFR_SERIES_KEY: "D.U2.EUR.4F.KR.DFR.LEV"
      ECB_MLFR_SERIES_KEY: "D.U2.EUR.4F.KR.MLFR.LEV"

      TWSE_FOREIGN_FLOW_API_URL: "https://www.twse.com.tw/rwd/zh/fund/T86"
      TWSE_FOREIGN_FLOW_SELECT_TYPE: "ALLBUT0999"

      TPEX_FOREIGN_FLOW_API_URL: "https://www.tpex.org.tw/www/zh-tw/insti/dailyTrade"
      TPEX_FOREIGN_FLOW_SECT: "AL"
      TPEX_FOREIGN_FLOW_TYPE: "Daily"

      FED_RATE_URL: "https://www.federalreserve.gov/monetarypolicy.htm"
      FED_SCHEDULE_URL: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"
      FED_MARKET_PRICING_URL: ""

      ECB_RATE_URL: "https://www.ecb.europa.eu/stats/policy_and_exchange_rates/key_ecb_interest_rates/html/index.en.html"
      ECB_SCHEDULE_URL: "https://www.ecb.europa.eu/press/calendars/mgcgc/html/index.en.html"
      ECB_MARKET_PRICING_URL: "https://www.ecb.europa.eu/press/govcdec/mopo/html/index.en.html"

      BOJ_RATE_URL: "https://www.boj.or.jp/en/"
      BOJ_SCHEDULE_URL: "https://www.boj.or.jp/en/mopo/mpmsche_minu/index.htm"
      BOJ_MARKET_PRICING_URL: "https://www.boj.or.jp/en/mopo/mpmdeci/state_2026/index.htm"

      PBOC_RATE_URL: ""
      PBOC_SCHEDULE_URL: "https://www.pbc.gov.cn/en/3688229/3688311/3688329/index.html"
      PBOC_MARKET_PRICING_URL: ""

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        run: python main.py

      - name: Verify outputs exist
        run: |
          test -f data/market_data.json
          test -f data/market_data_brief.json
          test -f data/central_bank_data.json

      - name: Validate JSON outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              Path("data/market_data.json"),
              Path("data/market_data_brief.json"),
              Path("data/central_bank_data.json"),
          ]

          for f in files:
              if not f.exists():
                  raise FileNotFoundError(f"Missing file: {f}")

              size = f.stat().st_size
              if size == 0:
                  raise ValueError(f"Empty JSON file: {f}")

              with f.open("r", encoding="utf-8") as fp:
                  json.load(fp)

              print(f"Valid JSON: {f} ({size:,} bytes)")

          brief_size = Path("data/market_data_brief.json").stat().st_size
          if brief_size > 500_000:
              raise ValueError(
                  f"market_data_brief.json too large for scheduled action input: {brief_size:,} bytes"
              )
          PY

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/market_data.json data/market_data_brief.json data/central_bank_data.json

          git diff --staged --quiet || git commit -m "market: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send JSON files via Gmail
        run: |
          python - <<'PY'
          import os
          import smtplib
          from datetime import datetime, timezone, timedelta
          from email.message import EmailMessage
          from pathlib import Path

          smtp_user = os.environ["SMTP_USERNAME"].strip()
          smtp_pass = os.environ["SMTP_APP_PASSWORD"].strip()
          email_to = os.environ["EMAIL_TO"].strip()

          files = [
              Path("data/market_data_brief.json"),
              Path("data/central_bank_data.json"),
          ]

          for f in files:
              if not f.exists():
                  raise FileNotFoundError(f"Missing attachment: {f}")

              if f.stat().st_size == 0:
                  raise ValueError(f"Empty attachment: {f}")

          brief_size = Path("data/market_data_brief.json").stat().st_size
          if brief_size > 500_000:
              raise ValueError(
                  f"market_data_brief.json too large for scheduled action input: {brief_size:,} bytes"
              )

          taipei_now = datetime.now(timezone.utc) + timedelta(hours=8)
          subject_date = taipei_now.strftime("%Y-%m-%d")

          msg = EmailMessage()
          msg["Subject"] = f"[market-json][daily][{subject_date}]"
          msg["From"] = smtp_user
          msg["To"] = email_to
          msg.set_content(
              "\n".join([
                  f"Daily market snapshot generated at {taipei_now.strftime('%Y-%m-%d %H:%M:%S')} Asia/Taipei",
                  "",
                  "Attachments:",
                  "- market_data_brief.json",
                  "- central_bank_data.json",
                  "",
                  "GitHub Pages links:",
                  "https://uptonke.github.io/yahoo-finance/data/market_data_brief.json",
                  "https://uptonke.github.io/yahoo-finance/data/central_bank_data.json",
                  "",
                  "Debug / audit file:",
                  "https://uptonke.github.io/yahoo-finance/data/market_data.json",
                  "",
                  "Note:",
                  "market_data_brief.json is the compact Scheduled Actions input.",
                  "market_data.json is the full debug/audit file and is not attached.",
              ])
          )

          for f in files:
              with open(f, "rb") as fp:
                  data = fp.read()

              msg.add_attachment(
                  data,
                  maintype="application",
                  subtype="json",
                  filename=f.name,
              )

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(smtp_user, smtp_pass)
              smtp.send_message(msg)

          print("Email sent successfully.")
          PY
