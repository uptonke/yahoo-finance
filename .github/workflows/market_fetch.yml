name: Daily Market Data Fetch

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-market-data-fetch
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      TD_SP500_SYMBOL: "SPY"
      TD_TAIEX_SYMBOL: "0050"
      TD_TAIEX_EXCHANGE: "TWSE"
      TD_WTI_SYMBOL: "WTI"
      FRED_USDTWD_SERIES: "DEXTAUS"

      TWSE_FOREIGN_FLOW_URL: ""
      TPEX_FOREIGN_FLOW_URL: "https://www.tpex.org.tw/zh-tw/mainboard/trading/major-institutional/detail/day.html"

      FED_RATE_URL: "https://www.federalreserve.gov/monetarypolicy.htm"
      FED_SCHEDULE_URL: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"
      FED_MARKET_PRICING_URL: ""

      ECB_RATE_URL: "https://www.ecb.europa.eu/stats/policy_and_exchange_rates/key_ecb_interest_rates/html/index.en.html"
      ECB_SCHEDULE_URL: "https://www.ecb.europa.eu/press/calendars/mgcgc/html/index.en.html"
      ECB_MARKET_PRICING_URL: "https://www.ecb.europa.eu/press/govcdec/mopo/html/index.en.html"

      BOJ_RATE_URL: "https://www.boj.or.jp/en/"
      BOJ_SCHEDULE_URL: "https://www.boj.or.jp/en/mopo/mpmsche_minu/index.htm"
      BOJ_MARKET_PRICING_URL: "https://www.boj.or.jp/en/mopo/mpmdeci/state_2026/index.htm"

      PBOC_RATE_URL: "https://www.pbc.gov.cn/en/3688229/3688335/3883798/index.html"
      PBOC_SCHEDULE_URL: ""
      PBOC_MARKET_PRICING_URL: ""

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        run: python main.py

      - name: Verify outputs exist
        run: |
          test -f data/market_data.json
          test -f data/central_bank_data.json

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.json data/central_bank_data.json
          git diff --staged --quiet || git commit -m "market: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push